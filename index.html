<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Lachita preciosita</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --crema:       #fdf6ee;
      --rosa-claro:  #f5c9c9;
      --rosa-medio:  #d9808a;
      --rosa-oscuro: #a85060;
      --tinto:       #5c2030;
      --blanco:      #ffffff;
      --negro:       #000000;
      --texto:       #3a1a22;
      --font-display: 'Great Vibes', cursive;
      --font-body:    'Cormorant Garamond', serif;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--crema);
      font-family: var(--font-body);
      color: var(--texto);
      -webkit-font-smoothing: antialiased;
    }

    .bg-grain {
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(245,201,201,0.35) 0%, transparent 55%),
        radial-gradient(circle at 80% 70%, rgba(217,128,138,0.20) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    /* ── Pantallas ── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.9s ease;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ── Pantalla 1 ── */
    #screen1 { gap: 28px; z-index: 10; }

    .title-main {
      font-family: var(--font-display);
      font-size: clamp(3rem, 14vw, 5rem);
      color: var(--tinto);
      text-align: center; line-height: 1.1;
      opacity: 0; transform: translateY(24px);
      animation: fadeUp 1.1s var(--ease-out-expo) 0.3s forwards;
    }

    #anim-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      animation: fadeUp 1.1s var(--ease-out-expo) 0.7s forwards;
    }

    #animation-container {
      width: 280px; height: 280px;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      cursor: default;
      box-shadow: 0 0 0 1.5px rgba(168,80,96,0.2);
    }

    #frame-canvas {
      width: 100%; height: 100%;
      display: block;
    }

    #tap-hint {
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-style: italic;
      letter-spacing: 0.07em;
      color: var(--rosa-medio);
      text-align: center;
      opacity: 0;
      transition: opacity 0.9s ease;
      pointer-events: none;
    }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0px  rgba(168,80,96,0.4); }
      70%  { box-shadow: 0 0 0 14px rgba(168,80,96,0);   }
      100% { box-shadow: 0 0 0 0px  rgba(168,80,96,0);   }
    }
    #animation-container.clickable {
      cursor: pointer;
      animation: pulse-ring 1.8s ease-out 0.2s infinite;
    }

    /* ── Canvas pétalos ── */
    #petal-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 999;
      opacity: 0; transition: opacity 0.3s ease;
    }
    #petal-canvas.active { opacity: 1; }

    /* ── Pantalla 2 ── */
    #screen2 {
      z-index: 10;
      justify-content: flex-start;
      padding-top: 60px;
      padding-bottom: 80px;
      overflow-y: auto;
      overflow-x: hidden;
      gap: 0;
      -webkit-overflow-scrolling: touch;
    }

    .envelope-header {
      width: 100%; max-width: 340px;
      text-align: center;
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      flex-shrink: 0;
      margin-bottom: 28px;
    }
    .envelope-header.visible { opacity: 1; transform: translateY(0); }
    .envelope-header .dear {
      font-family: var(--font-display);
      font-size: 2.6rem; color: var(--tinto);
      display: block; margin-bottom: 8px;
    }
    .envelope-header hr {
      border: none;
      border-top: 1px solid rgba(168,80,96,0.3);
      margin: 0 auto; width: 60%;
    }

    /* ── Carta: contenedor que crece con el texto ── */
    #letter-body {
      width: 100%; max-width: 340px;
      font-size: 1.15rem; font-weight: 300;
      line-height: 1.85; color: var(--texto);
      font-style: italic;
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
      /* sin min-height fija — crece naturalmente */
      flex-shrink: 0;
      margin-bottom: 40px;
    }
    #letter-body.visible { opacity: 1; transform: translateY(0); }



    /* ── Botón "Toca para continuar" ── */
    #btn-continue-wrapper {
      width: 100%; max-width: 340px;
      display: flex;
      justify-content: center;
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.9s ease, transform 0.9s ease;
      pointer-events: none;
      flex-shrink: 0;
      margin-bottom: 40px;
    }
    #btn-continue-wrapper.visible {
      opacity: 1; transform: translateY(0);
      pointer-events: all;
    }

    #btn-continue {
      position: relative;
      font-family: var(--font-body);
      font-size: 1rem;
      font-style: italic;
      letter-spacing: 0.12em;
      color: var(--rosa-oscuro);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0 0 6px 0;
      outline: none;
    }
    #btn-continue::after {
      content: '';
      position: absolute;
      left: 0; bottom: 0;
      width: 100%; height: 1px;
      background: var(--rosa-medio);
      transform: scaleX(0.4);
      transform-origin: left;
      transition: transform 0.4s var(--ease-out-expo);
    }
    #btn-continue:hover::after,
    #btn-continue:focus::after {
      transform: scaleX(1);
    }
    #btn-continue .petal-icon {
      display: inline-block;
      margin-left: 6px;
      transition: transform 0.3s ease;
    }
    #btn-continue:hover .petal-icon {
      transform: rotate(20deg) scale(1.2);
    }

    /* ── Sección de botones Sí / No ── */

    /* ── Secuencia de Letra Taylor Swift ── */
    #lyric-section {
      width: 100%; max-width: 340px;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      flex-grow: 1; /* Para que ocupe el espacio central */
      opacity: 0;
      transition: opacity 0.4s ease;
      margin-bottom: 40px;
      min-height: 120px;
    }
    
    #lyric-text {
      font-family: var(--font-display);
      font-size: 2.8rem;
      color: var(--tinto);
      text-align: center;
      line-height: 1.2;
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    
    #lyric-text.show {
      opacity: 1;
      transform: translateY(0);
    }
    #buttons-section {
      width: 100%; max-width: 340px;
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.9s ease, transform 0.9s ease;
      pointer-events: none;
      flex-shrink: 0;
      margin-bottom: 40px;
    }
    #buttons-section.visible {
      opacity: 1; transform: translateY(0);
      pointer-events: all;
    }

    .question-label {
      font-family: var(--font-body);
      font-size: 1rem; letter-spacing: 0.06em;
      color: var(--rosa-oscuro);
      text-align: center; font-style: italic;
    }

    .btn-choice {
      width: 100%;
      font-family: var(--font-body);
      font-size: 1.1rem; font-weight: 400;
      letter-spacing: 0.08em;
      padding: 15px 24px; border-radius: 60px;
      border: none; cursor: pointer;
      transition: transform 0.2s ease;
    }
    .btn-choice:active { transform: scale(0.95); }
    #btn-yes { background: var(--tinto); color: var(--crema); }
    #btn-no  { background: transparent; color: var(--tinto); border: 1.5px solid var(--tinto); }

    /* ── Pantalla final ── */
    #screen-final {
      background: var(--negro); z-index: 100;
      transition: opacity 1.8s ease;
    }
    #screen-final p {
      font-family: var(--font-display);
      font-size: clamp(2rem, 10vw, 3.5rem);
      color: var(--blanco); text-align: center;
      opacity: 0; transition: opacity 1.4s ease 0.8s;
    }
    #screen-final.active p { opacity: 1; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body>
  <div class="bg-grain"></div>
  <canvas id="petal-canvas"></canvas>

  <!-- ════ PANTALLA 1 ════ -->
  <div id="screen1" class="screen active">
    <h1 class="title-main">Holi mi ranita</h1>

    <div id="anim-wrapper">
      <div id="animation-container">
        <canvas id="frame-canvas"></canvas>
      </div>
      <span id="tap-hint">Toma la flor para continuar </span>
    </div>
  </div>

  <!-- ════ PANTALLA 2 ════ -->
  <div id="screen2" class="screen">
    <div class="envelope-header" id="env-header">
      <span class="dear">Laura Gabriela,</span>
      <hr />
    </div>

    <div class="letter-body" id="letter-body"></div>

    <!-- Botón sutil para continuar (aparece al terminar el tipeo) -->
    <div id="btn-continue-wrapper">
      <button id="btn-continue">
        toca para continuar
        <span class="petal-icon">🌸</span>
      </button>
    </div>

    <div id="lyric-section">
      <p id="lyric-text"></p>
    </div>

    <!-- Sección de botones (oculta al inicio) -->
    <div id="buttons-section">
      <p class="question-label">¿crees que estamos listos?</p>
      <button class="btn-choice" id="btn-yes">Sí 🌸</button>
      <button class="btn-choice" id="btn-no">Todavía no 🍃</button>
    </div>
  </div>

  <!-- ════ PANTALLA FINAL ════ -->
  <div id="screen-final" class="screen">
    <p>Puedes guardar el celular</p>
  </div>

  <script>

    /* ══════════════════════════════════════
       ★ MODIFICA SOLO ESTAS VARIABLES
    ══════════════════════════════════════ */

    const LETTER_TEXT = `Gracias por acompañarme a vivir lo que sin duda fue una hermosa experiencia. Tu compañía constante es la bendición más grande de mi vida. “Porque solo tú sabes que cuando estás es más bonita la tarde”.\n\nEl tiempo desde el primer minuto en el que me diste la ilusión de que podría tenerte de esta manera tan linda ha sido la mejor época de mi vida. Cada experiencia contigo, pequeña o grande, se convierte en un recuerdo que deseo atesorar por toda mi vida, y deseo tenerte a mi lado como prueba viviente de cada hermoso recuerdo que vayamos construyendo juntos. \n\nNo solo valoro las experiencias bonitas. Valoro que estás ahí día y noche porque ambos somos felices con nuestra compañía y porque hemos logrado demostrar que todo es mejor juntos, incluso y en especial los momentos difíciles. Te pido por favor que continúes siendo mi compañera en cada momento y etapa de mi vida. Deseo formar un equipo de vida contigo porque te quiero a ti y solo a ti a mi lado. \n\nLa ilusión que me llenó cuando te referiste a este día como nuestra primera cita me llevó a planear día a día el convertir este momento en algo inolvidable para los dos.\n\nQuiero que sepas que te elijo a ti como el amor para mi vida porque no es casualidad que llore cuando escucho canciones bonitas o cuando justo eran las 11:11 y estábamos tomados de la mano mientras sonaba "Rojo". Te amo y quiero amarte cada día, siento que el momento es ahora porque tú misma me recordaste que la vida es muy corta. No sabemos cómo será el mañana, pero lo único que sí tengo seguro es que, sin importar lo que venga, quiero que sea a tu lado. Porque cada minuto sin ti es un minuto perdido.`;

    const TYPING_SPEED = 40;      // ms por carácter

    const FRAME_COUNT  = 45;
    const FRAME_PREFIX = 'frames/frame';
    const FRAME_EXT    = '.png';
    const FRAME_DIGITS = 3;
    const FRAME_FPS    = 12;

    const not_variable1 = '0JSy8_EfuwuuJrh2B';
    const EMAILJS_SERVICE    = 'service_ofdl2cd';
    const EMAILJS_TEMPLATE   = 'template_7rynpug';
    const EMAILJS_TO_EMAIL   = 'kmilo3molina@gmail.com';

    /* ══════════════════════════════════════
       FIN CONFIGURACIÓN
    ══════════════════════════════════════ */

    emailjs.init({ publicKey: not_variable1 });

    const screen1          = document.getElementById('screen1');
    const screen2          = document.getElementById('screen2');
    const screenFinal      = document.getElementById('screen-final');
    const btnYes           = document.getElementById('btn-yes');
    const btnNo            = document.getElementById('btn-no');
    const letterBody       = document.getElementById('letter-body');
    const buttonsSection   = document.getElementById('buttons-section');
    const btnContinueWrap  = document.getElementById('btn-continue-wrapper');
    const btnContinue      = document.getElementById('btn-continue');
    const envHeader        = document.getElementById('env-header');
    const petalCanvas      = document.getElementById('petal-canvas');
    const animContainer    = document.getElementById('animation-container');
    const tapHint          = document.getElementById('tap-hint');
    const frameCanvas      = document.getElementById('frame-canvas');
    const fCtx             = frameCanvas.getContext('2d');

    const SZ  = 280;
    const DPR = window.devicePixelRatio || 1;

    const lyricSection     = document.getElementById('lyric-section');
    const lyricText        = document.getElementById('lyric-text');

    frameCanvas.width        = SZ * DPR;
    frameCanvas.height       = SZ * DPR;
    frameCanvas.style.width  = SZ + 'px';
    frameCanvas.style.height = SZ + 'px';
    fCtx.scale(DPR, DPR);


    /* ══ FOTOGRAMAS ══════════════════════════ */

    function pad(n, d) { return String(n).padStart(d, '0'); }

    function drawContained(img) {
      fCtx.clearRect(0, 0, SZ, SZ);
      if (!img || !img.naturalWidth) return;
      const iw = img.naturalWidth, ih = img.naturalHeight;
      const scale = Math.min(SZ / iw, SZ / ih);
      const dw = iw * scale, dh = ih * scale;
      const dx = (SZ - dw) / 2, dy = (SZ - dh) / 2;
      fCtx.drawImage(img, dx, dy, dw, dh);
    }

    const frames = [];
    let loaded = 0;

    for (let i = 1; i <= FRAME_COUNT; i++) {
      const img = new Image();
      img.src = `${FRAME_PREFIX}${pad(i, FRAME_DIGITS)}${FRAME_EXT}`;
      img.onload  = () => { loaded++; if (loaded === FRAME_COUNT) startFrameAnim(); };
      img.onerror = () => { loaded++; if (loaded === FRAME_COUNT) startFrameAnim(); };
      frames.push(img);
    }

    function startFrameAnim() {
      let cur = 0;
      drawContained(frames[0]);
      const iv = setInterval(() => {
        cur++;
        if (cur >= FRAME_COUNT) {
          cur = FRAME_COUNT - 1;
          drawContained(frames[cur]);
          clearInterval(iv);
          activateFlowerButton();
          return;
        }
        drawContained(frames[cur]);
      }, 1000 / FRAME_FPS);
    }

    function activateFlowerButton() {
      setTimeout(() => {
        animContainer.classList.add('clickable');
        tapHint.style.opacity = '1';
        animContainer.addEventListener('click', goToLetter, { once: true });
      }, 350);
    }


    /* ══ PÉTALOS ══════════════════════════════ */

    const ctx2d = petalCanvas.getContext('2d');
    let petals = [], petalAnim = null;

    function resizeCanvas() {
      petalCanvas.width  = window.innerWidth;
      petalCanvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function spawnPetals() {
      petals = [];
      for (let i = 0; i < 70; i++) {
        petals.push({
          x: Math.random() * petalCanvas.width,
          y: -30 - Math.random() * petalCanvas.height * 0.5,
          r: 5 + Math.random() * 8,
          vy: 1.8 + Math.random() * 3,
          vx: (Math.random() - 0.5) * 1.5,
          angle: Math.random() * Math.PI * 2,
          spin: (Math.random() - 0.5) * 0.08,
          alpha: 0.6 + Math.random() * 0.4,
          heart: Math.random() > 0.4,
          hue: Math.random() > 0.5 ? '#d9808a' : '#f5c9c9',
        });
      }
    }

    function drawHeart(x, y, s, a, c) {
      ctx2d.save();
      ctx2d.globalAlpha = a; ctx2d.fillStyle = c;
      ctx2d.translate(x, y);
      ctx2d.beginPath();
      ctx2d.moveTo(0, -s*.3);
      ctx2d.bezierCurveTo( s*.7,-s,  s*1.1, s*.3, 0,  s*.9);
      ctx2d.bezierCurveTo(-s*1.1, s*.3, -s*.7,-s, 0, -s*.3);
      ctx2d.fill(); ctx2d.restore();
    }

    function animPetals() {
      ctx2d.clearRect(0, 0, petalCanvas.width, petalCanvas.height);
      let alive = false;
      petals.forEach(p => {
        p.y += p.vy; p.x += p.vx + Math.sin(p.angle) * 0.6;
        p.angle += p.spin; p.alpha -= 0.003;
        if (p.y < petalCanvas.height + 40 && p.alpha > 0) alive = true;
        if (p.heart) {
          drawHeart(p.x, p.y, p.r, Math.max(0, p.alpha), p.hue);
        } else {
          ctx2d.save();
          ctx2d.globalAlpha = Math.max(0, p.alpha);
          ctx2d.fillStyle = p.hue;
          ctx2d.beginPath();
          ctx2d.arc(p.x, p.y, p.r * .55, 0, Math.PI*2);
          ctx2d.fill(); ctx2d.restore();
        }
      });
      if (alive) {
        petalAnim = requestAnimationFrame(animPetals);
      } else {
        petalCanvas.classList.remove('active');
        ctx2d.clearRect(0, 0, petalCanvas.width, petalCanvas.height);
      }
    }

    function launchPetals(cb) {
      spawnPetals();
      petalCanvas.classList.add('active');
      if (petalAnim) cancelAnimationFrame(petalAnim);
      petalAnim = requestAnimationFrame(animPetals);
      setTimeout(cb, 900);
    }


    /* ══ NAVEGACIÓN ══════════════════════════ */

    function goToLetter() {
      tapHint.style.opacity = '0';
      animContainer.classList.remove('clickable');

      launchPetals(() => {
        screen1.classList.remove('active');
        screen2.classList.add('active');

        setTimeout(() => {
          envHeader.classList.add('visible');
          letterBody.classList.add('visible');
        }, 200);

        setTimeout(() => {
          typeWriter(LETTER_TEXT, () => {
            // Al terminar el tipeo, mostrar el botón "toca para continuar"
            setTimeout(() => {
              btnContinueWrap.classList.add('visible');
              screen2.scrollTop = screen2.scrollHeight;
            }, 600);
          });
        }, 700);
      });
    }

    /* Al tocar "continuar": animación de corazones, borrar carta, mostrar botones */
    /* Al tocar "continuar": mostrar secuencia de Taylor Swift y luego los botones */
    btnContinue.addEventListener('click', () => {
      btnContinueWrap.style.pointerEvents = 'none';

      launchPetals(() => {
        // Ocultar carta y botón continuar con transición
        letterBody.style.transition = 'opacity 0.6s ease';
        letterBody.style.opacity = '0';
        btnContinueWrap.style.transition = 'opacity 0.6s ease';
        btnContinueWrap.style.opacity = '0';

        setTimeout(() => {
          // Quitar del flujo pero dejar "Laura Gabriela," visible arriba
          letterBody.style.display = 'none';
          btnContinueWrap.style.display = 'none';

          // Mostrar el contenedor de la letra
          lyricSection.style.display = 'flex';
          lyricSection.offsetHeight; // Forzar reflow para que la animación funcione
          lyricSection.style.opacity = '1';

          // Scroll al inicio
          screen2.scrollTop = 0;

          // Arreglo con la frase dividida estéticamente en 4 partes
          const phrases = [
            "Pledge allegiance...",
            "...to your hands,",
            "your team,",
            "your vibes ✨"
          ];
          
          let pIdx = 0;

          function showNextPhrase() {
            if (pIdx < phrases.length) {
              // 1. Ocultar la frase anterior
              lyricText.classList.remove('show');
              
              setTimeout(() => {
                // 2. Cambiar el texto y mostrarlo suavemente
                lyricText.textContent = phrases[pIdx];
                lyricText.classList.add('show');
                pIdx++;
                
                // 3. Tiempo para leer reducido (1600ms en lugar de 2800ms)
                setTimeout(showNextPhrase, 1600);
              }, 450); // Tiempo de fade-out reducido
              
            } else {
              // Terminó la secuencia, ocultamos el texto y mostramos los botones
              lyricText.classList.remove('show');
              setTimeout(() => {
                lyricSection.style.display = 'none';
                
                // Ahora sí se mostrarán los botones correctamente
                buttonsSection.classList.add('visible');
                screen2.scrollTop = screen2.scrollHeight;
              }, 450);
            }
          }

          // Iniciar la secuencia
          showNextPhrase();

        }, 650);
      });
    });


    /* ══ TIPEO ════════════════════════════════ */

    function typeWriter(text, onDone) {
      // Dividir en párrafos por \n y procesar cada segmento
      const segments = text.split('\n');
      let segIdx = 0;
      let charIdx = 0;

      // Crear el primer párrafo
      let currentP = document.createElement('p');
      currentP.style.cssText = 'margin: 0 0 0.9em 0; font-style: inherit; font-size: inherit; font-weight: inherit; line-height: inherit; color: inherit;';
      letterBody.appendChild(currentP);

      function tick() {
        if (segIdx >= segments.length) {
          setTimeout(() => { onDone(); }, 500);
          return;
        }

        const seg = segments[segIdx];

        if (charIdx >= seg.length) {
          // Segmento terminado → avanzar al siguiente
          segIdx++;
          charIdx = 0;
          if (segIdx < segments.length) {
            // Nuevo párrafo
            currentP = document.createElement('p');
            currentP.style.cssText = 'margin: 0 0 0.9em 0; font-style: inherit; font-size: inherit; font-weight: inherit; line-height: inherit; color: inherit;';
            letterBody.appendChild(currentP);
          }
          setTimeout(tick, TYPING_SPEED);
          return;
        }

        const ch = seg[charIdx++];
        currentP.appendChild(document.createTextNode(ch));
        screen2.scrollTop = screen2.scrollHeight;
        setTimeout(tick, TYPING_SPEED);
      }

      tick();
    }


    /* ══ AUDIO ═══════════════════════════════ */

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function getAudio() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }

    function playNote(freq, start, dur, vol = 0.25, type = 'sine') {
      const ctx = getAudio();
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.05);
    }

    function playSoundYes() {
      playNote(523.25, 0.00, 1.2, 0.22);
      playNote(659.25, 0.08, 1.1, 0.20);
      playNote(783.99, 0.16, 1.0, 0.18);
      playNote(1046.5, 0.28, 1.4, 0.15);
    }

    function playSoundNo() {
      playNote(392.00, 0.00, 1.5, 0.20, 'triangle');
      playNote(493.88, 0.12, 1.3, 0.18, 'triangle');
      playNote(440.00, 0.30, 1.6, 0.14, 'triangle');
    }


    /* ══ CORREO ══════════════════════════════ */

    function sendEmail() {
      emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
        to_email: EMAILJS_TO_EMAIL,
        subject:  '🌸 Dijiste que sí',
        message:  'Dijiste que sí. Estamos listos. Te quiero mucho. 🐸',
      }).catch(e => console.warn('EmailJS:', e));
    }


    /* ══ BOTONES RESPUESTA ═══════════════════ */

    btnYes.addEventListener('click', () => {
      btnYes.disabled = btnNo.disabled = true;
      playSoundYes();
      sendEmail();
      setTimeout(() => screenFinal.classList.add('active'), 600);
    });

    btnNo.addEventListener('click', () => {
      btnYes.disabled = btnNo.disabled = true;
      playSoundNo();
      setTimeout(() => screenFinal.classList.add('active'), 600);
    });

  </script>
</body>
